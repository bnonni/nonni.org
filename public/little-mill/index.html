<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Nonni.org</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom right, #f0f4ff, #dfe9f3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    h1 {
      font-size: 3em;
      color: #2c3e50;
    }
    p {
      font-size: 1.2em;
      color: #555;
      margin-bottom: 2em;
    }
    nav {
      display: flex;
      gap: 2em;
    }
    a {
      padding: 1em 2em;
      text-decoration: none;
      background-color: #2c3e50;
      color: white;
      border-radius: 8px;
      font-size: 1.1em;
      transition: background 0.3s ease;
    }
    a:hover {
      background-color: #1abc9c;
    }
  </style>
</head>
<body>
  <h1>Welcome to Nonni.org</h1>
  <p>Explore simple, fun, and educational coding tools, app ideas and a fun demo.</p>
  <nav>
    <a href="/demo">Live Demos</a>
    <a href="/ideas">App Ideas</a>
    <a href="/resources">Resources</a>
  </nav>
</body>
</html>
